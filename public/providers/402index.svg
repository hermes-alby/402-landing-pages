<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>402index</title>
  <desc>Fallback brand mark based on the 402index site wordmark: blue “402” and white “index” on a dark background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#151f3b" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)" />
  <rect x="16" y="16" width="224" height="224" rx="40" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2" />
  <text x="128" y="118" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-0.06em">
    <tspan fill="#6f8cff">402</tspan>
  </text>
  <text x="128" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.03em" fill="#ffffff">index</text>
</svg>
